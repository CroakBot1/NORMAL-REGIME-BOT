services:
  - type: worker
    name: bybit-reserve-copytrade-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: BYBIT_MODE
        value: live

      - key: MAX_API_ACCOUNTS
        value: "50"
      - key: FOLLOWER_RESERVE_ENABLED
        value: "true"
      - key: FOLLOWER_SLEEP_BETWEEN_ACCOUNTS_SEC
        value: "0.25"

      - key: COPY_TRADE_ENABLED
        value: "true"
      - key: COPY_CATEGORY
        value: linear
      - key: COPY_SYMBOLS
        value: BTCUSDT
      - key: COPY_SIZE_MULTIPLIER
        value: "1"
      - key: COPY_SET_LEVERAGE
        value: "true"
      - key: COPY_CLOSE_EXTRA_POSITIONS
        value: "true"
      - key: COPY_SLEEP_BETWEEN_ACCOUNTS_SEC
        value: "0.25"
      - key: COPY_DRY_RUN
        value: "false"

      - key: RESERVE_USDT
        value: "501"
      - key: MIN_TRANSFER_USDT
        value: "1"
      - key: POSITION_TOPUP_USDT
        value: "50"
      - key: LOSS_CLOSE_USDT
        value: "70"
      - key: BOT_SLEEP_SEC
        value: "15"
      - key: POSITION_LOCK_FILE
        value: /tmp/bybit_position_topup.lock

      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false

      - key: BYBIT_API_KEY_02
        sync: false
      - key: BYBIT_API_SECRET_02
        sync: false
