services:
  - type: web
    name: panic-trader-web
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_TOKEN
        sync: false
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: panic-trader-db
          property: connectionString

  - type: worker
    name: panic-trader-worker
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: panic-trader-db
          property: connectionString

databases:
  - name: panic-trader-db
    plan: starter
