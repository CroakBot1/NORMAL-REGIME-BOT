services:
  - type: worker
    name: bybit-reserve-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: BYBIT_MODE
        value: live

      - key: RESERVE_USDT
        value: "501"
      - key: MIN_TRANSFER_USDT
        value: "1"
      - key: POSITION_TOPUP_USDT
        value: "50"
      - key: LOSS_CLOSE_USDT
        value: "70"
      - key: BOT_SLEEP_SEC
        value: "15"
      - key: POSITION_LOCK_FILE
        value: /tmp/bybit_position_topup.lock

      - key: COPY_TRADE_ENABLED
        value: "true"
      - key: COPY_TRADE_LEADER_ACCOUNT
        value: "1"
      - key: COPY_TRADE_FOLLOWERS_START
        value: "2"
      - key: COPY_TRADE_FOLLOWERS_END
        value: "50"
      - key: COPY_TRADE_LEVERAGE
        value: "3"
      - key: COPY_TRADE_WALLET_PCT
        value: "0.90"
      - key: COPY_TRADE_MIN_ORDER_USDT
        value: "5"
      - key: COPY_TRADE_REQUIRE_NO_FOLLOWER_POSITION
        value: "true"
      - key: COPY_TRADE_LOCK_PREFIX
        value: /tmp/bybit_copy_trade.lock

      - key: BYBIT_API_KEY_1
        sync: false
      - key: BYBIT_API_SECRET_1
        sync: false
      - key: BYBIT_API_KEY_2
        sync: false
      - key: BYBIT_API_SECRET_2
        sync: false
